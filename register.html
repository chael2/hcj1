<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>웹프로그래밍 데모 - 회원가입</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <div class="logo">WebDemo</div>
        <ul class="nav">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="list.html">List</a></li>
          <li><a href="timetable.html">Timetable</a></li>
          <li><a href="media.html">Media</a></li>
          <li><a href="register.html">Register</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </div>
    </nav>

    <section class="main">
      <div class="container">
        <h1>사용자 등록 (Register)</h1>
        <hr />

        <div class="form-container">
          <form action="#">
            <div class="form-group">
              <label>이름:</label>
              <input
                type="text"
                name="username"
                placeholder="이름을 입력하세요"
                required
              />
            </div>

            <div class="form-group">
              <label>학번:</label>
              <input
                type="text"
                name="studentid"
                placeholder="학번 8자리를 입력하세요"
                maxlength="8"
              />
            </div>

            <div class="form-group">
              <label>이메일:</label>
              <input
                type="email"
                name="email"
                placeholder="example@test.com"
                required
              />
            </div>

            <div class="form-group">
              <label>비밀번호:</label>
              <input type="password" name="pwd" required />
            </div>

            <div class="form-group">
              <label>성별:</label>
              <input type="radio" name="gender" value="m" checked /> 남
              <input type="radio" name="gender" value="f" /> 여
            </div>

            <div class="form-group">
              <label>관심 분야:</label>
              <input type="checkbox" name="interest" value="web" /> 보안
              <input type="checkbox" name="interest" value="security" /> 웹
              <input type="checkbox" name="interest" value="ai" /> 개발
              <input type="checkbox" name="interest" value="ai" /> AI
            </div>

            <div class="form-group">
              <label>자기소개:</label><br />
              <textarea
                name="intro"
                rows="4"
                cols="50"
                placeholder="간단한 자기소개를 입력해주세요."
              ></textarea>
            </div>

            <div class="form-buttons">
              <button type="submit">가입하기</button>
              <button type="reset" style="background-color: #bbb">
                초기화
              </button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <script src="main.js"></script>
  </body>
</html>
